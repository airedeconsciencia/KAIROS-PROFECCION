<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KAIROS Onboarding Bienvenida</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d7c188",
                        "background-light": "#f3f7fb",
                        "background-dark": "#1e1b14",
                        "warm-grey": "#4a4a45",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",

                    },
                },
            },

<style>

</div>
</div>

<div class="space-y-4 max-w-xs">
<h1 class="text-3xl font-extrabold tracking-tight text-warm-grey dark:text-slate-100 font-display">
                    Bienvenido a KAIROS
                </h1>
<p class="text-base font-medium leading-relaxed text-warm-grey/70 dark:text-slate-400">

</div>
</div>

<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 bg-primary text-white shadow-lg shadow-primary/20 hover:brightness-105 active:scale-[0.98] transition-all">

</div>

<div class="pt-2">
<button class="text-sm font-medium text-warm-grey/40 hover:text-warm-grey dark:text-slate-500 dark:hover:text-slate-300">

                </button>
