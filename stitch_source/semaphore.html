<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d7c188",
                        "background-light": "#f3f7fb",
                        "background-dark": "#1a1d21",
                        "warm-grey": "#4a4a45",
                        "stable": "#cfe9dd",
                        "activation": "#a8d9d8",
                        "sensitive": "#e9c7cf",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>KAIROS Onboarding - Semáforo de Acción</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-300">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto shadow-2xl bg-background-light dark:bg-background-dark">
<!-- Top App Bar / Status -->
<div class="flex items-center justify-between p-6 pb-2">
<button class="p-2 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-warm-grey dark:text-slate-400">arrow_back_ios_new</span>
</button>
<h2 class="text-warm-grey dark:text-slate-300 text-sm font-bold uppercase tracking-widest">KAIROS</h2>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<!-- Main Content Area -->
<div class="flex flex-col items-center justify-center flex-1 px-8 pt-4 pb-12">
<!-- The Semaphore Visual -->
<div class="flex flex-col gap-8 items-center w-full my-8">
<!-- Stable State -->
<div class="flex flex-col items-center group">
<div class="w-24 h-24 rounded-full flex items-center justify-center bg-stable shadow-[0_0_30px_rgba(207,233,221,0.6)] relative overflow-hidden" data-alt="Soft glowing desaturated green circular indicator for stability">
<div class="absolute inset-0 bg-gradient-to-tr from-white/20 to-transparent"></div>
<span class="material-symbols-outlined text-emerald-700/60 text-3xl">eco</span>
</div>
<p class="mt-3 text-sm font-bold text-warm-grey dark:text-slate-300 tracking-wide uppercase">Estable</p>
</div>
<!-- Activation State -->
<div class="flex flex-col items-center group">
<div class="w-24 h-24 rounded-full flex items-center justify-center bg-activation shadow-[0_0_30px_rgba(168,217,216,0.6)] relative overflow-hidden" data-alt="Soft glowing desaturated teal circular indicator for activation">
<div class="absolute inset-0 bg-gradient-to-tr from-white/20 to-transparent"></div>
<span class="material-symbols-outlined text-teal-700/60 text-3xl">bolt</span>
</div>
<p class="mt-3 text-sm font-bold text-warm-grey dark:text-slate-300 tracking-wide uppercase">Activación</p>
</div>
<!-- Sensitive State -->
<div class="flex flex-col items-center group">
<div class="w-24 h-24 rounded-full flex items-center justify-center bg-sensitive shadow-[0_0_30px_rgba(233,199,207,0.6)] relative overflow-hidden" data-alt="Soft glowing desaturated pink circular indicator for sensitive points">
<div class="absolute inset-0 bg-gradient-to-tr from-white/20 to-transparent"></div>
<span class="material-symbols-outlined text-rose-700/60 text-3xl">hourglass_empty</span>
</div>
<p class="mt-3 text-sm font-bold text-warm-grey dark:text-slate-300 tracking-wide uppercase">Punto Sensible</p>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-4 max-w-xs mx-auto">
<h1 class="text-3xl font-extrabold text-slate-900 dark:text-slate-100 leading-tight">Acción con Intención</h1>
<p class="text-warm-grey dark:text-slate-400 text-base leading-relaxed font-medium">
                    Interpretamos tus ciclos para que sepas cuándo avanzar, cuándo construir o cuándo simplemente pausar.
                </p>
</div>
</div>
<!-- Bottom Actions & Navigation -->
<div class="px-8 pb-10 flex flex-col items-center gap-8">
<!-- Primary CTA -->
<button class="w-full bg-primary hover:bg-primary/90 text-slate-900 font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-95 flex items-center justify-center gap-2">
<span>Entrar a mi Mapa</span>
<span class="material-symbols-outlined">explore</span>
</button>
<!-- Pagination Dots -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<div class="w-2 h-2 rounded-full bg-primary/20"></div>
<div class="w-6 h-2 rounded-full bg-primary transition-all duration-300"></div>
</div>
</div>
<!-- Decorative background element -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-activation/10 rounded-full blur-3xl pointer-events-none"></div>
</div>
</body></html>
