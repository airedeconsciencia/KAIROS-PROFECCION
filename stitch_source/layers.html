<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KAIROS Onboarding - Tu Clima en 3 Capas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#a013ec",
                "background-light": "#f3f7fb",
                "background-dark": "#1c1022",
                "warm-grey": "#4a4a45",
                "lavender-accent": "#dfcfe7",
                "gold-accent": "#d4af37"
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Main Container (iOS Phone Aspect Ratio Emulation for Demo) -->
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top App Bar / Navigation -->
<div class="flex items-center p-6 pb-2 justify-between">
<button aria-label="Back" class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-start focus:outline-none">
<span class="material-symbols-outlined text-2xl">arrow_back_ios</span>
</button>
<div class="flex-1 text-center">
<span class="text-primary font-extrabold tracking-widest text-sm uppercase">Kairos</span>
</div>
<div class="size-10 flex items-center justify-end">
<button class="text-sm font-semibold text-primary/70">Saltar</button>
</div>
</div>
<!-- Illustration Section (3 Concentric Rings) -->
<div class="flex w-full grow flex-col items-center justify-center px-8 py-4">
<div class="relative w-full aspect-square max-w-[320px] flex items-center justify-center">
<!-- Outer Ring: Profección -->
<div class="absolute w-full h-full rounded-full border border-primary/20 flex items-center justify-center">
<span class="absolute -top-3 bg-background-light px-3 text-[10px] font-bold tracking-widest text-primary/40 uppercase">Profección</span>
</div>
<!-- Middle Ring: Tránsitos -->
<div class="absolute w-[70%] h-[70%] rounded-full border border-primary/40 flex items-center justify-center">
<span class="absolute -top-3 bg-background-light px-2 text-[10px] font-bold tracking-widest text-primary/60 uppercase">Tránsitos</span>
</div>
<!-- Inner Ring: Luna -->
<div class="absolute w-[40%] h-[40%] rounded-full border-2 border-primary flex items-center justify-center bg-primary/5">
<span class="absolute -top-3 bg-background-light px-2 text-[10px] font-bold tracking-widest text-primary uppercase">Luna</span>
<span class="material-symbols-outlined text-primary text-3xl">dark_mode</span>
</div>
<!-- Decorative Gold Accents -->
<div class="absolute top-10 right-10 size-2 rounded-full bg-gold-accent/40"></div>
<div class="absolute bottom-20 left-4 size-1.5 rounded-full bg-gold-accent/40"></div>
</div>
</div>
<!-- Content Section -->
<div class="px-8 pt-8 pb-12 flex flex-col items-center text-center">
<h2 class="text-slate-900 dark:text-slate-100 text-3xl font-extrabold leading-tight tracking-tight mb-4">
                Tu Clima en 3 Capas
            </h2>
<p class="text-warm-grey dark:text-slate-300 text-lg font-medium leading-[1.6] max-w-xs">
                Analizamos tu estructura anual, los tránsitos planetarios y tu reloj interno para ofrecerte claridad sin dramas.
            </p>
</div>
<!-- Navigation / Footer -->
<div class="mt-auto px-8 pb-12">
<!-- Pagination Dots -->
<div class="flex w-full flex-row items-center justify-center gap-3 mb-10">
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
<div class="h-2 w-8 rounded-full bg-primary transition-all duration-300"></div>
<div class="h-2 w-2 rounded-full bg-primary/20"></div>
</div>
<!-- Primary CTA Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-5 px-6 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-95 flex items-center justify-center gap-2">
                Continuar
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
<!-- Safe Area Spacer for iOS Home Indicator -->
<div class="h-4"></div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden opacity-30 pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[40%] rounded-full bg-primary/5 blur-[100px]"></div>
<div class="absolute top-[40%] -right-[10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[100px]"></div>
</div>
</body></html>
