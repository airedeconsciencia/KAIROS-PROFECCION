<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d7c188",
                        "background-light": "#f3f7fb", // Light sky blue
                        "card-offwhite": "#fbfaf7",
                        "warm-grey": "#4a4a45",
                        "background-dark": "#1e1b14",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.875rem", // 14px as requested
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .zodiac-card { transition: all 0.2s ease-in-out; }
        .zodiac-card.active { border-color: #d7c188; background-color: rgba(215, 193, 136, 0.1); }
    </style>
<title>KAIROS - Configuración de Ciclo</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>

<div class="relative flex min-h-screen w-full flex-col items-center p-6 sm:p-8">

<header class="w-full max-w-md flex flex-col items-center mb-8">
<div class="mb-4">

<div class="size-12 rounded-full border border-primary/40 flex items-center justify-center bg-white shadow-sm overflow-hidden">

</div>

<p class="text-xs tracking-[0.2em] uppercase font-semibold text-warm-grey/60 mb-1">Aire de Consciencia</p>
<h1 class="text-2xl font-bold tracking-tight text-warm-grey dark:text-slate-100">Activa tu Ciclo</h1>
</header>
<!-- Main Configuration Card -->
<main class="w-full max-w-md bg-card-offwhite dark:bg-slate-900/50 rounded-lg shadow-xl shadow-blue-900/5 border border-white/50 dark:border-slate-800 p-6 sm:p-8 space-y-8">
<div class="space-y-2">
<h2 class="text-lg font-semibold leading-tight text-warm-grey dark:text-slate-200">Configuración de Ciclo</h2>
<p class="text-sm text-warm-grey/70 dark:text-slate-400">Ingresa tu información para activar tu mapa de vida.</p>

<label class="text-sm font-medium text-warm-grey dark:text-slate-300 ml-1" for="age">Tu Edad Actual</label>
<div class="relative">
<input class="w-full h-14 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 text-lg font-medium focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all placeholder:text-warm-grey/30" id="age" placeholder="Ej. 28" type="number"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 text-warm-grey/40">
<span class="material-symbols-outlined">calendar_today</span>
</div>
</div>
</div>

<span class="text-xs font-bold text-warm-grey dark:text-slate-200">Aries</span>

<span class="text-xs font-medium text-warm-grey/60 dark:text-slate-400">Tauro</span>
</button>
<!-- Gemini -->
<button class="zodiac-card flex flex-col items-center justify-center min-w-[80px] h-24 bg-white dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700 shadow-sm hover:border-primary/50">
<span class="material-symbols-outlined text-warm-grey/40 mb-1 text-2xl">article</span>
<span class="text-xs font-medium text-warm-grey/60 dark:text-slate-400">Géminis</span>
</button>

<button class="zodiac-card flex flex-col items-center justify-center min-w-[80px] h-24 bg-white dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700 shadow-sm hover:border-primary/50">
<span class="material-symbols-outlined text-warm-grey/40 mb-1 text-2xl">article</span>
<span class="text-xs font-medium text-warm-grey/60 dark:text-slate-400">Cáncer</span>
</button>
<!-- Leo -->
<button class="zodiac-card flex flex-col items-center justify-center min-w-[80px] h-24 bg-white dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700 shadow-sm hover:border-primary/50">
<span class="material-symbols-outlined text-warm-grey/40 mb-1 text-2xl">article</span>
<span class="text-xs font-medium text-warm-grey/60 dark:text-slate-400">Leo</span>
</button>
<!-- Virgo -->
<button class="zodiac-card flex flex-col items-center justify-center min-w-[80px] h-24 bg-white dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700 shadow-sm hover:border-primary/50">
<span class="material-symbols-outlined text-warm-grey/40 mb-1 text-2xl">article</span>
<span class="text-xs font-medium text-warm-grey/60 dark:text-slate-400">Virgo</span>
</button>
</div>
</div>
<!-- CTA Section -->
<div class="pt-4 space-y-6">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group">
                    Descubrir mi Año
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Explanatory Note -->
<div class="flex gap-3 px-2">
<span class="material-symbols-outlined text-primary text-sm shrink-0 mt-0.5">info</span>
<p class="text-[11px] leading-relaxed italic text-warm-grey/60 dark:text-slate-500">
                        Utilizamos el sistema de <span class="font-semibold text-warm-grey/80 dark:text-slate-400">Signos Enteros</span> para calcular tu estructura de vida con precisión de ingeniería vital.

<!-- Background decorative elements -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] aspect-square bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[30%] aspect-square bg-blue-400/5 rounded-full blur-3xl -z-10"></div>

            KAIROS • AIRE DE CONSCIENCIA
